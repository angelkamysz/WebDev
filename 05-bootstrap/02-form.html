<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>

  <body class="bg-light">
    <main class="container min-vh-100 d-flex justify-content-center py-5">
      <form
        action="/submitform"
        class="bg-white border rounded shadow-sm p-4 p-md-5 w-100"
        style="max-width: 640px"
      >
        <h1 class="text-center m-4 fs-2 fw-bold">Roth IRA Calculator</h1>

        <div class="row align-items-center mb-4">
          <label for="balance" class="col-12 col-md-6 col-form-label fs-5">
            Balance ($)
          </label>

          <div class="col-12 col-md-6">
            <input
              class="form-control form-control-lg"
              type="text"
              id="balance"
              name="balance"
            />
          </div>
        </div>

        <div class="row align-items-center mb-4">
          <label for="annual" class="col-12 col-md-6 col-form-label fs-5">
            Annual Contribution ($)
          </label>

          <div class="col-12 col-md-6">
            <input
              class="form-control form-control-lg"
              type="text"
              id="annual"
              name="annual"
            />
          </div>
        </div>

        <fieldset class="row mb-4">
          <legend class="col-12 col-md-6 col-form-label fs-5 pt-0">
            Maximize contributions?
          </legend>

          <div class="col-12 col-md-6">
            <div class="form-check mb-2">
              <input
                class="form-check-input"
                type="radio"
                name="maximize"
                id="yes"
                value="yes"
              />
              <label class="form-check-label fs-5" for="yes"> Yes </label>
            </div>

            <div class="form-check">
              <input
                class="form-check-input"
                type="radio"
                name="maximize"
                id="no"
                value="no"
              />
              <label class="form-check-label fs-5" for="no"> No </label>
            </div>
          </div>
        </fieldset>

        <div class="row align-items-center mb-4">
          <label for="rate" class="col-12 col-md-6 col-form-label fs-5">
            Expected return (%)
          </label>

          <div class="col-12 col-md-6">
            <input
              class="form-control form-control-lg"
              type="number"
              name="rate"
              id="rate"
            />
          </div>
        </div>

        <div class="row align-items-center mb-4">
          <label for="current" class="col-12 col-md-6 col-form-label fs-5">
            Current age
          </label>

          <div class="col-12 col-md-6">
            <input
              class="form-control form-control-lg"
              type="number"
              name="current"
              id="current"
            />
          </div>
        </div>

        <div class="row align-items-center mb-4">
          <label for="retire" class="col-12 col-md-6 col-form-label fs-5">
            Retirement age
          </label>

          <div class="col-12 col-md-6">
            <input
              class="form-control form-control-lg"
              type="number"
              name="retire"
              id="retire"
            />
          </div>
        </div>

        <div class="row align-items-center mb-4">
          <label for="tax" class="col-12 col-md-6 col-form-label fs-5">
            Tax rate (%)
          </label>

          <div class="col-12 col-md-6">
            <input
              class="form-control form-control-lg"
              type="number"
              name="tax"
              id="tax"
            />
          </div>
        </div>

        <div class="row g-2 mb-4">
          <div class="col-6">
            <input
              class="btn btn-primary btn-lg w-100"
              type="submit"
              value="Calculate"
            />
          </div>

          <div class="col-6">
            <input
              class="btn btn-outline-secondary btn-lg w-100"
              type="reset"
              value="Reset"
            />
          </div>
        </div>

        <p class="text-secondary fs-5 mb-0">
          This exercise is a simplified version of the Roth IRA Calculator
          <a href="https://www.calculator.net/roth-ira-calculator.html">
            Calculator.net
          </a>
        </p>
      </form>
    </main>
  </body>
</html>
